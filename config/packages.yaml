# Unity Package Configurations
# Define packages to be built from open source repositories

packages:
  # Example package configuration
  - name: "com.klumhru.wrapper.google-protobuf"
    display_name: "Google Protobuf for Unity"
    description: "Protocol Buffers for Unity, a language-neutral, platform-neutral extensible mechanism for serializing structured data."
    version: "v31.1.0"
    source:
      type: git
      url: "https://github.com/protocolbuffers/protobuf.git"
      ref: "v31.1"
    extract_path: "csharp/src/Google.Protobuf"
    asmdef_name: "Google.Protobuf"
    namespace: "Google.Protobuf"
    keywords: ["protobuf", "serialization", "unity"]
    asmdef_extra:
      allowUnsafeCode: true
    package_json_extra:
      license: "https://github.com/protocolbuffers/protobuf/blob/v31.1/LICENSE"
      homepage: "https://github.com/protocolbuffers/protobuf/tree/v31.1"

  # YetAnotherHttpHandler for Unity
  - name: "com.klumhru.wrapper.yetanotherhttphandler"
    display_name: "YetAnotherHttpHandler for Unity"
    description: "YetAnotherHttpHandler is a lightweight HTTP handler for Unity, providing an easy way to make HTTP requests."
    version: "1.11.3"
    source:
      type: git
      url: "https://github.com/Cysharp/YetAnotherHttpHandler.git"
      ref: "1.11.3"
    extract_path: "src/YetAnotherHttpHandler"
    asmdef_name: "YetAnotherHttpHandler.Unity"
    asmdef_extra:
      allowUnsafeCode: true
    namespace: "YetAnotherHttpHandler"
    keywords: ["http", "handler", "unity"]
    dependencies:
      "com.klumhru.wrapper.system-io-pipelines": "9.0.7"
    package_json_extra:
      license: "MIT"
      homepage: "https://github.com/Cysharp/YetAnotherHttpHandler"

  # MessagePipe for Unity
  - name: "com.klumhru.wrapper.messagepipe"
    display_name: "MessagePipe for Unity"
    description: "A fast and lightweight messaging system for Unity."
    version: "1.8.1"
    source:
      type: git
      url: "https://github.com/Cysharp/MessagePipe.git"
      ref: "1.8.1"
    extract_path: "src/MessagePipe.Unity/Assets/Plugins/MessagePipe"
    asmdef_name: "MessagePipe"
    assembly_references:
      - "UniTask"
    namespace: "MessagePipe"
    keywords: ["messaging", "unity"]
    dependencies:
      "com.klumhru.wrapper.unitask": "2.5.10-1"
    package_json_extra:
      license: "MIT"
      homepage: "https://github.com/Cysharp/MessagePipe"

  # MessagePipe VContainer
  - name: "com.klumhru.wrapper.messagepipe-vcontainer"
    display_name: "MessagePipe VContainer for Unity"
    description: "Integration of MessagePipe with VContainer for Unity."
    version: "1.0.0"
    source:
      type: git
      url: "https://github.com/Cysharp/MessagePipe.git"
      ref: "1.8.1"
    extract_path: "src/MessagePipe.Unity/Assets/Plugins/MessagePipe.VContainer"
    asmdef_name: "MessagePipe.VContainer"
    assembly_references:
      - "MessagePipe"
      - "VContainer"
    namespace: "MessagePipe.VContainer"
    keywords: ["messaging", "vcontainer", "unity"]
    package_json_extra:
      license: "MIT"
      homepage: "https://github.com/Cysharp/MessagePipe"

  # VContainer for Unity
  - name: "com.klumhru.wrapper.vcontainer"
    display_name: "VContainer for Unity"
    description: "A lightweight and fast dependency injection framework for Unity."
    version: "1.0.0"
    source:
      type: git
      url: "https://github.com/hadashiA/VContainer.git"
      ref: "1.16.9"
    extract_path: "VContainer/Assets/VContainer"
    asmdef_name: "VContainer"
    asmdef_extra:
      allowUnsafeCode: true
    namespace: "VContainer"
    keywords: ["dependency injection", "unity"]
    package_json_extra:
      license: "MIT"

  # UniTask for Unity
  - name: "com.klumhru.wrapper.unitask"
    display_name: "UniTask for Unity"
    description: "A fast and efficient alternative to C# async/await for Unity."
    version: "2.5.10-1"
    source:
      type: git
      url: "https://github.com/Cysharp/UniTask.git"
      ref: "2.5.10"
    extract_path: "src/UniTask/Assets/Plugins/UniTask"
    asmdef_name: "UniTask"
    namespace: "Cysharp.Threading.Tasks"
    keywords: ["async", "await", "unity"]
    # versionDefines are present in the upstream asmdef; they are preserved
    # automatically when the source ships its own UniTask.asmdef.  These
    # extras serve as a fallback if the source asmdef is absent.
    asmdef_extra:
      versionDefines:
        - name: "com.unity.modules.ugui"
          expression: ""
          define: "UNITASK_UGUI_SUPPORT"
        - name: "com.unity.modules.assetbundle"
          expression: ""
          define: "UNITASK_ASSETBUNDLE_SUPPORT"
        - name: "com.unity.modules.physics"
          expression: ""
          define: "UNITASK_PHYSICS_SUPPORT"
        - name: "com.unity.modules.physics2d"
          expression: ""
          define: "UNITASK_PHYSICS2D_SUPPORT"
        - name: "com.unity.modules.particlesystem"
          expression: ""
          define: "UNITASK_PARTICLESYSTEM_SUPPORT"
        - name: "com.unity.modules.unitywebrequest"
          expression: ""
          define: "UNITASK_WEBREQUEST_SUPPORT"
    package_json_extra:
      license: "MIT"
      homepage: "https://github.com/Cysharp/UniTask"

