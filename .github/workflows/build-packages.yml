name: Unity Package Builder

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run daily at 02:00 UTC to check for updates
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      package_name:
        description: 'Specific package to build (optional)'
        required: false
        type: string

env:
  PYTHON_VERSION: '3.13'

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      packages-changed: ${{ steps.changes.outputs.packages }}
      config-changed: ${{ steps.changes.outputs.config }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: dorny/paths-filter@v2
        id: changes
        with:
          filters: |
            packages:
              - 'config/packages.yaml'
            config:
              - 'config/**'
              - 'src/**'
              - 'pyproject.toml'

  build-packages:
    needs: check-changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  # Required for publishing to GitHub Package Registry
      pages: write     # Required for deploying to GitHub Pages
      id-token: write  # Required for OIDC GitHub Pages deployment
    if: needs.check-changes.outputs.packages-changed == 'true' || needs.check-changes.outputs.config-changed == 'true' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 2.1.4

      - name: Install dependencies (Poetry)
        run: |
          make install

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Check for package updates
        id: check-updates
        run: |
          echo "Checking for package updates..."
          make check > check_output.txt 2>&1
          cat check_output.txt

          # Check if any packages need updates
          if grep -q "Packages needing updates" check_output.txt; then
            echo "updates-needed=true" >> $GITHUB_OUTPUT
          else
            echo "updates-needed=false" >> $GITHUB_OUTPUT
          fi

      - name: Build specific package
        if: github.event.inputs.package_name != ''
        run: |
          echo "Building specific package: ${{ github.event.inputs.package_name }}"
          make build-package PACKAGE="${{ github.event.inputs.package_name }}"

      - name: Build all packages
        if: github.event.inputs.package_name == '' && steps.check-updates.outputs.updates-needed == 'true'
        run: |
          echo "Building all packages..."
          make build

      - name: Upload package artifacts
        if: steps.check-updates.outputs.updates-needed == 'true' || github.event.inputs.package_name != ''
        uses: actions/upload-artifact@v4
        with:
          name: unity-packages
          path: packages/
          retention-days: 30
          include-hidden-files: false

      - name: Set up Node.js for npm
        if: (steps.check-updates.outputs.updates-needed == 'true' || github.event.inputs.package_name != '') && github.ref == 'refs/heads/main'
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          registry-url: 'https://npm.pkg.github.com'

      - name: Restore Pages registry cache
        if: (steps.check-updates.outputs.updates-needed == 'true' || github.event.inputs.package_name != '') && github.ref == 'refs/heads/main'
        uses: actions/cache/restore@v4
        with:
          path: dist/registry
          key: pages-registry-${{ github.run_id }}
          restore-keys: |
            pages-registry-

      - name: Create settings file for CI
        if: (steps.check-updates.outputs.updates-needed == 'true' || github.event.inputs.package_name != '') && github.ref == 'refs/heads/main'
        run: |
          # Create a temporary settings file with CI configuration
          cat > config/settings.yaml << EOF
          # Unity Package Wrapper Configuration for CI

          # Global settings for the package wrapper
          templates_dir: "templates"
          output_dir: "packages"
          work_dir: ".unity_wrapper_temp"

          # GitHub Package Registry settings
          github:
            owner: "${{ github.repository_owner }}"
            repository: "${{ github.event.repository.name }}"

          # Default package settings
          defaults:
            author: "GitHub Actions <actions@github.com>"
            unity_version: "2019.4"
            unity_release: "0f1"
            package_type: "library"

          # Build settings
          build:
            auto_generate_asmdef: true
            auto_generate_meta: true
            auto_organize_runtime: true
            remove_csharp_project_files: true
            fix_global_namespaces: true
          EOF

      - name: Publish packages to GitHub Package Registry
        if: (steps.check-updates.outputs.updates-needed == 'true' || github.event.inputs.package_name != '') && github.ref == 'refs/heads/main'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.PACKAGES_PAT }}
          GITHUB_TOKEN: ${{ secrets.PACKAGES_PAT }}
          PAGES_BASE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
        run: |
          echo "Publishing packages to GitHub Package Registry..."
          make publish REGISTRY=github OWNER=${{ github.repository_owner }}

      - name: Check if static registry was generated
        id: check-registry
        if: github.ref == 'refs/heads/main'
        run: |
          if [ -d "dist/registry" ] && [ "$(ls -A dist/registry)" ]; then
            echo "registry-exists=true" >> $GITHUB_OUTPUT
          else
            echo "registry-exists=false" >> $GITHUB_OUTPUT
            echo "dist/registry/ not found or empty, skipping Pages deploy"
          fi

      - name: Save Pages registry cache
        if: steps.check-registry.outputs.registry-exists == 'true'
        uses: actions/cache/save@v4
        with:
          path: dist/registry
          key: pages-registry-${{ github.run_id }}

      - name: Configure GitHub Pages
        if: steps.check-registry.outputs.registry-exists == 'true'
        uses: actions/configure-pages@v4

      - name: Upload static registry to GitHub Pages
        if: steps.check-registry.outputs.registry-exists == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/registry/

      - name: Deploy static registry to GitHub Pages
        if: steps.check-registry.outputs.registry-exists == 'true'
        uses: actions/deploy-pages@v4

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 2.1.4

      - name: Install dependencies (Poetry)
        run: |
          make install-dev

      - name: Run tests with coverage
        run: |
          make test-coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 2.1.4

      - name: Install dependencies (Poetry)
        run: |
          make install-dev

      - name: Run linting
        run: |
          make lint
