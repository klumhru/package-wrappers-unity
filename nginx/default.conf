# Local proxy for the GitHub Pages Unity package registry.
#
# Problem solved
# --------------
# GitHub Pages applies Content-Encoding: gzip to .tgz files.  Unity UPM
# reads Content-Length (the compressed size) as the expected stream size,
# decompresses the body to a larger byte count, and reports a "stream size
# mismatch".  Even when the stream size check passes, UPM computes sha512
# on the compressed bytes — not the decompressed tarball — so the
# integrity check fails.
#
# How this fixes it
# -----------------
# 1. proxy_set_header Accept-Encoding "identity" tells Pages not to gzip
#    the response.  Pages then sends the raw .tgz bytes with the correct
#    Content-Length (e.g. 266112 rather than 266090).
# 2. sub_filter rewrites the absolute dist.tarball URLs in JSON packuments
#    from the GitHub Pages origin to http://localhost:4873 so that Unity
#    requests tarballs through this proxy (not directly from Pages).
# 3. gzip off prevents nginx from re-compressing the responses it serves
#    to Unity.

resolver 8.8.8.8 valid=300s;

server {
    listen 4873;

    location / {
        proxy_pass         https://klumhru.github.io/package-wrappers-unity/;
        proxy_set_header   Host            klumhru.github.io;
        # Do not request gzip from upstream — Pages must serve raw bytes
        # so Unity receives the exact bytes whose sha512 is stored in the
        # packument.
        proxy_set_header   Accept-Encoding "identity";
        proxy_ssl_server_name on;

        # Rewrite packument dist.tarball URLs to use this local proxy so
        # that tarball downloads also bypass Pages' gzip encoding.
        sub_filter_types *;
        sub_filter_once  off;
        sub_filter "https://klumhru.github.io/package-wrappers-unity"
                   "http://localhost:4873";

        # Never gzip our own responses.
        gzip off;
    }
}
